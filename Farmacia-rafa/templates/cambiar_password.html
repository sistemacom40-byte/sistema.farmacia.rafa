{% extends 'base.html' %}
{% block title %}Cambiar Contrase&ntilde;a{% endblock %}
{% block page_title %}Cambiar Contrase&ntilde;a{% endblock %}

{% block content %}
<div class="card" style="max-width:450px;">
  <div class="card-header p-3">
    <i class="fas fa-key me-2 text-primary"></i>Cambiar Contrase&ntilde;a
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Contrase&ntilde;a actual *</label>
        <input type="password" name="password_actual" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Nueva contrase&ntilde;a *</label>
        <input type="password" name="password_nueva" class="form-control" required minlength="6">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Confirmar nueva contrase&ntilde;a *</label>
        <input type="password" name="password_confirmar" class="form-control" required minlength="6">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Guardar</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
