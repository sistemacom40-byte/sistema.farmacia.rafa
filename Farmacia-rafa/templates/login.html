<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Rafa - Iniciar Sesion</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    min-height: 100vh;
    background: url('/static/img/hospital.jpg') center center/cover no-repeat fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }
  
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 30, 80, 0.55);
    z-index: 0;
  }
  
  .login-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 16px;
  }
  
  .login-box {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 24px;
    padding: 48px 40px;
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
  }
  
  .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  
  .brand-icon {
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 2.2rem;
    color: white;
    font-weight: 900;
  }
  
  .brand h2 {
    font-weight: 800;
    color: white;
    font-size: 1.8rem;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  
  .brand p {
    color: rgba(255,255,255,0.8);
    font-size: 0.9rem;
    margin-top: 4px;
  }
  
  .form-label {
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    font-size: 0.85rem;
  }
  
  .form-control {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 12px;
    padding: 13px 16px;
    color: white;
    font-size: 0.95rem;
  }
  
  .form-control::placeholder { color: rgba(255,255,255,0.5); }
  
  .form-control:focus {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.7);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
    color: white;
    outline: none;
  }
  
  .btn-login {
    background: white;
    color: #0D47A1;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-weight: 700;
    width: 100%;
    font-size: 1rem;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  
  .btn-login:hover {
    background: rgba(255,255,255,0.9);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  
  .copy {
    text-align: center;
    color: rgba(255,255,255,0.6);
    font-size: 0.75rem;
    margin-top: 24px;
  }
  
  .alert {
    background: rgba(255,50,50,0.3);
    border: 1px solid rgba(255,100,100,0.5);
    color: white;
    border-radius: 10px;
  }
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-box">
    <div class="brand">
      <div class="brand-icon">+</div>
      <h2>Hospital Raf&aacute;</h2>
      <p>Sistema de Gesti&oacute;n</p>
    </div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert mb-3">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    
    <form method="POST">
      <div class="mb-3">
        <label class="form-label"><i class="fas fa-envelope me-2"></i>Correo electr&oacute;nico</label>
        <input type="email" name="correo" class="form-control" placeholder="correo@ejemplo.com" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label"><i class="fas fa-lock me-2"></i>Contrase&ntilde;a</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesi&oacute;n
      </button>
    </form>
    <div class="copy">&copy; 2026 Hospital Raf&aacute; &mdash; Tu salud es nuestra prioridad</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
